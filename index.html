<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good As You Are</title>
    <!-- Preconnect till Google Fonts (behålls för DNS-warming) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preconnect till Strapi media CDN → sparar ~330ms på LCP-bilden -->
    <link rel="preconnect" href="https://proper-smile-c7afd5ea1f.media.strapiapp.com" />
    <!-- Google Fonts laddas icke-blockerande → sparar ~780ms på FCP -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    </noscript>
    <!-- Silktide Consent Manager -->
    <link rel="stylesheet" id="silktide-consent-manager-css" href="/cookiebanner/silktide-consent-manager.css">
    <style>
      /* Göm den flytande cookie-ikonen — hanteras via footer-knappen */
      #silktide-cookie-icon {
        display: none !important;
      }
      /* Göm Silktide-kreditlänken */
      #silktide-modal footer a[href*="silktide.com"] {
        display: none !important;
      }
    </style>
    <script src="/cookiebanner/silktide-consent-manager.js"></script>
    <script>
      var COOKIE_BANNER_TEXT = {
        sv: {
          cookieTypeName: "Nödvändiga",
          cookieTypeDesc: "<p>Dessa cookies är nödvändiga för att webbplatsen ska fungera korrekt och kan inte stängas av.</p>",
          bannerDesc: "<p>Vi använder cookies för att förbättra din upplevelse och analysera vår trafik.</p>",
          acceptAll: "Acceptera alla",
          acceptAllLabel: "Acceptera alla cookies",
          rejectNonEssential: "Avvisa icke-nödvändiga",
          rejectNonEssentialLabel: "Avvisa icke-nödvändiga cookies",
          preferences: "Inställningar",
          preferencesLabel: "Öppna cookie-inställningar",
          prefTitle: "Anpassa dina cookie-inställningar",
          prefDesc: "<p>Vi respekterar din rätt till integritet. Du kan välja att inte tillåta vissa typer av cookies.</p>"
        },
        en: {
          cookieTypeName: "Necessary",
          cookieTypeDesc: "<p>These cookies are necessary for the website to function and cannot be switched off.</p>",
          bannerDesc: "<p>We use cookies to enhance your experience and analyze our traffic.</p>",
          acceptAll: "Accept all",
          acceptAllLabel: "Accept all cookies",
          rejectNonEssential: "Reject non-essential",
          rejectNonEssentialLabel: "Reject non-essential cookies",
          preferences: "Preferences",
          preferencesLabel: "Open cookie preferences",
          prefTitle: "Customize your cookie preferences",
          prefDesc: "<p>We respect your right to privacy. You can choose not to allow some types of cookies.</p>"
        }
      };

      function buildCookieBannerConfig(locale) {
        var t = COOKIE_BANNER_TEXT[locale] || COOKIE_BANNER_TEXT.sv;
        return {
          background: { showBackground: true },
          cookieIcon: { position: "bottomRight" },
          cookieTypes: [{
            id: "necessary",
            name: t.cookieTypeName,
            description: t.cookieTypeDesc,
            required: true
          }],
          text: {
            banner: {
              description: t.bannerDesc,
              acceptAllButtonText: t.acceptAll,
              acceptAllButtonAccessibleLabel: t.acceptAllLabel,
              rejectNonEssentialButtonText: t.rejectNonEssential,
              rejectNonEssentialButtonAccessibleLabel: t.rejectNonEssentialLabel,
              preferencesButtonText: t.preferences,
              preferencesButtonAccessibleLabel: t.preferencesLabel
            },
            preferences: {
              title: t.prefTitle,
              description: t.prefDesc,
              creditLinkText: " ",
              creditLinkAccessibleLabel: " "
            }
          },
          position: { banner: "center" }
        };
      }

      var initialLocale = window.localStorage.getItem("goodasyouare:locale") || "sv";
      silktideCookieBannerManager.updateCookieBannerConfig(buildCookieBannerConfig(initialLocale));
      window.updateCookieBannerLocale = function(locale) {
        silktideCookieBannerManager.updateCookieBannerConfig(buildCookieBannerConfig(locale));
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
